# Shared base — changes here trigger ALL SQL connector tests.
# Direct connectors (bigquery_v2, snowflake, etc.) are detected via import analysis.
# This list covers SQL-family connectors whose source lives under sql/ itself.
is_shared_base: true
test_paths:
  - tests/integration/clickhouse/
  - tests/integration/db2/
  - tests/integration/doris/
  - tests/integration/druid/
  - tests/integration/hana/
  - tests/integration/hive/
  - tests/integration/hive-metastore/
  - tests/integration/mysql/
  - tests/integration/oracle/
  - tests/integration/postgres/
  - tests/integration/sql_server/
  - tests/integration/starburst-trino-usage/
  - tests/integration/trino/
  - tests/integration/vertica/
